name: Build M3U

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *"   # 6時間ごとに自動実行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build playlist.m3u
        run: python build_m3u.py

- name: Commit and push
  run: |
    git config user.name "github-actions"
    git config user.email "actions@github.com"
    git add playlist.m3u
    git commit -m "Auto update playlist.m3u" || echo "No changes"
    git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/spencermassygm-design/japan-iptv-m3u.git HEAD:main
